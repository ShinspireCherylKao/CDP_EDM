  - generic [ref=e194]:
    - generic [ref=e195]:
      - generic [ref=e196]: 常見問題
      - heading "你可能想問的" [level=2] [ref=e197]
    - generic [ref=e198]:
      - generic [ref=e199]:
        - button "我們案場已經有 CRM 了，還需要這個嗎？ " [ref=e200] [cursor=pointer]:
          - text: 我們案場已經有 CRM 了，還需要這個嗎？
          - generic [ref=e201]: 
        - generic [ref=e202]: CRM 管的是「客人來了之後怎麼記」，AI 業績引擎管的是「下一個案推的時候，怎麼把這些人找回來並且追到底」。兩者互補，而且我們可以串接您現有的系統，不需要重新建置。
      - generic [ref=e203]:
        - button "導入需要多久？我們沒有 IT 部門。 " [ref=e204] [cursor=pointer]:
          - text: 導入需要多久？我們沒有 IT 部門。
          - generic [ref=e205]: 
        - generic [ref=e206]: 基礎建置約 4 到 6 週，含數據整合與系統串接。我們有專屬顧問全程協助導入，不需要您額外養 IT 人力。過去的經驗是，代銷的專案助理就能配合完成。
      - generic [ref=e207]:
        - button "我的客戶名單安全嗎？ " [ref=e208] [cursor=pointer]:
          - text: 我的客戶名單安全嗎？
          - generic [ref=e209]: 
        - generic [ref=e210]: 系統符合資安規範，資料加密儲存、權限分級管控。您的名單只有您授權的人看得到，不會跟其他客戶混用，也不會被第三方取得。
      - generic [ref=e211]:
        - button "業務端好操作嗎？他們不太會用新系統。 " [ref=e212] [cursor=pointer]:
          - text: 業務端好操作嗎？他們不太會用新系統。
          - generic [ref=e213]: 
        - generic [ref=e214]: 業務不需要學新系統。通知透過 APP 推送，點開就能看到指派名單和客戶情報，操作門檻跟看 LINE 訊息差不多。主管端也是，審核放行只需要按一個按鈕。
      - generic [ref=e215]:
        - button "可以先試一個案場看看嗎？ " [ref=e216] [cursor=pointer]:
          - text: 可以先試一個案場看看嗎？
          - generic [ref=e217]: 
        - generic [ref=e218]: 可以。大部分客戶都是從單一案場開始導入，驗證效果之後再擴展到其他案場。我們建議選一個即將推新案的案場，效果最明顯。
      - generic [ref=e219]:
        - button "跟一般行銷自動化工具有什麼不同？ " [ref=e220] [cursor=pointer]:
          - text: 跟一般行銷自動化工具有什麼不同？
          - generic [ref=e221]: 
        - generic [ref=e222]: 一般行銷工具解決的是「怎麼發訊息」，AI 業績引擎解決的是「發給誰、誰來打、打了沒」的完整鏈路。從名單篩選到業務執行到主管稽核，是一條完整的管理閉環——這是房產銷售特有的需求，一般工具做不到。
